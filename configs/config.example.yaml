# OpenAgentFramework Configuration
#
# Environment variables can be used with ${VAR_NAME} syntax.
# All ${VAR_NAME} references are expanded from environment variables at runtime.
# See docs/configuration/environment-variables.md for complete reference.

github:
  # Personal access token (repo scope required)
  # Generate at: https://github.com/settings/tokens
  # Required scopes: repo, read:user
  # Format: ghp_xxxxxxxxxxxxxxxxxxxx or github_pat_xxxxxxxxxxxxxxxxxxxx
  token: "${GITHUB_TOKEN}"
  
  # Repository owner (organization or username)
  # Example: "myorg" or "myusername"
  owner: "gaskaj"
  
  # Repository name
  # Example: "my-project"
  repo: "OpenAgentFramework"
  
  # Polling interval for checking new GitHub events
  # Supported formats: "30s", "1m", "5m"
  # Minimum recommended: "10s", Maximum recommended: "5m"
  poll_interval: "30s"
  
  # Labels to watch for claimable issues
  # Agent will only process issues with these labels
  # Labels are automatically managed: agent:ready -> agent:claimed -> agent:working
  watch_labels:
    - "agent:ready"

controlplane:
    enabled: true
    url: "http://localhost:8080"
    api_key: "oaf_f0d78f01d79736d916c7faceced40e92b7467d469c5484e1327edc3b70e3181d"
    agent_name: "developer-1"
    heartbeat_interval: 30s
    # API version to use for communication with control plane
    api_version: "v1"

claude:
  # Anthropic API key
  # Get from: https://console.anthropic.com/
  # Format: sk-ant-api03-xxxxxxxxxxxx
  # Keep this secret and never commit to version control
  api_key: "${ANTHROPIC_API_KEY}"
  
  # Claude model to use for code generation
  # Available models: claude-sonnet-4-20250514, claude-sonnet-4-20241022
  # Recommended: claude-sonnet-4-20250514 (latest)
  model: "claude-sonnet-4-20250514"
  
  # Maximum tokens per response (limits response length)
  # Range: 1-8192, Recommended: 8192 for code generation
  # Lower values = faster responses, higher values = more complete code
  max_tokens: 8192

agents:
  developer:
    # Enable/disable the developer agent
    enabled: true
    
    # Maximum concurrent issues to work on simultaneously  
    # Recommended: 1-3 (higher values increase resource usage)
    # Must be > 0 when agent is enabled
    max_concurrent: 1
    
    # Directory for cloned repository workspaces
    # Must be writable by the agent process
    # Each issue gets its own workspace subdirectory
    # Example: "./workspaces/issue-123/"
    workspace_dir: "./workspaces"
    
    # Workspace persistence configuration
    workspace:
      persistence:
        # Enable workspace persistence and recovery
        enabled: true
        
        # Interval between automatic snapshots during long-running operations
        snapshot_interval: "5m"
        
        # Maximum number of snapshots to retain per issue
        max_snapshots: 10
        
        # Hours to retain snapshots before cleanup
        retention_hours: 72
        
        # Compress snapshots to save disk space
        compress_snapshots: true
        
        # Automatically attempt to resume from snapshots on restart
        resume_on_restart: true
        
        # Validate snapshot integrity before attempting resume
        validate_before_resume: true

state:
  # State storage backend
  # Currently only "file" is supported
  backend: "file"
  
  # Directory for persistent agent state files
  # Must be writable and persistent across restarts
  # Contains JSON files tracking agent workflow state
  dir: ".agentctl/state"

logging:
  # Log level: debug, info, warn, error
  # debug: Verbose logging for development
  # info: Normal operational logging
  # warn: Important warnings only
  # error: Error conditions only
  level: "info"
  
  # Optional: Log to file instead of stdout/stderr
  # If specified, enables file-based logging with rotation/cleanup
  # Directory will be created if it doesn't exist
  file_path: "./logs/agent.log"
  
  # Log rotation configuration (only applies when file_path is set)
  rotation:
    # Enable automatic log rotation based on size and age
    enabled: true
    
    # Rotate log file when it exceeds this size (in MB)
    # Recommended: 50-500MB depending on disk space and log volume
    max_file_size_mb: 100
    
    # Maximum number of rotated log files to keep
    # Older files beyond this limit are automatically deleted
    # Recommended: 5-20 files
    max_files: 10
    
    # Maximum age before rotating a log file
    # Files older than this duration are rotated regardless of size
    # Format: "24h", "7d", "720h" (30 days)
    max_age: "720h"  # 30 days
    
    # Compress rotated log files using gzip to save disk space
    # Recommended: true for production environments
    compress_old: true
    
    # How frequently to check if rotation is needed
    # More frequent checks = more responsive rotation, but higher CPU usage
    # Recommended: 1h-6h
    check_interval: "1h"
  
  # Log cleanup configuration (applies to log directory)  
  cleanup:
    # Enable automatic cleanup of old log files
    enabled: true
    
    # Delete log files older than this many days
    # Set to 0 to disable age-based cleanup
    # Recommended: 30-180 days depending on compliance requirements
    retention_days: 90
    
    # Cleanup old logs when free disk space falls below this threshold (MB)
    # Set to 0 to disable disk-space-based cleanup
    # Recommended: 1GB-10GB depending on system
    min_free_disk_mb: 1024  # 1GB
    
    # How frequently to run cleanup operations
    # More frequent cleanup = better disk space management, but higher I/O
    # Recommended: 6h-24h
    cleanup_interval: "24h"
    
    # Compress log files before deleting them (creates .gz archives)
    # Provides a grace period for recovering accidentally deleted logs
    # Note: Archives are still deleted, this just adds compression step
    archive_before_delete: true

creativity:
  # Enable autonomous creativity mode when idle
  # When enabled, agent generates improvement suggestions during idle periods
  # SECURITY NOTE: Creates GitHub issues autonomously - review before enabling
  enabled: true
  
  # Seconds idle before entering creativity mode
  # Higher values = less frequent suggestions
  # Recommended: 120-600 seconds
  idle_threshold_seconds: 120
  
  # Cooldown between suggestion attempts (seconds)
  # Prevents spam suggestions
  # Recommended: 300-1800 seconds
  suggestion_cooldown_seconds: 300
  
  # Maximum open suggestion issues before pausing creativity
  # Prevents overwhelming the issue tracker
  # Must be > 0 when creativity is enabled
  # Recommended: 1-5
  max_pending_suggestions: 20
  
  # Maximum rejected suggestion titles to remember (avoids duplicates)
  # Higher values = better duplicate detection, more memory usage
  # Recommended: 50-200
  max_rejection_history: 50

decomposition:
  # Enable automatic issue decomposition for complex issues
  # When enabled, the agent estimates complexity during analysis and breaks
  # large issues into smaller subtasks that are processed independently.
  enabled: true
  # Iteration budget for complexity estimation (recommended: 20-50).
  # Issues estimated to need more iterations than this are decomposed proactively.
  max_iteration_budget: 250
  # Maximum number of subtasks when decomposing an issue.
  max_subtasks: 5

shutdown:
  # Maximum time to wait for graceful shutdown before force kill
  timeout: "30s"
  # Whether to clean up workspace directories on shutdown
  cleanup_workspaces: true
  # Whether to reset agent:claimed labels to agent:ready on startup recovery
  reset_claims: true

error_handling:
  retry:
    # Enable retry mechanisms across agent communications
    enabled: true
    # Default retry policy applied when no specific policy is defined
    default:
      max_attempts: 3
      base_delay: "1s"
      max_delay: "30s"
      backoff_factor: 2.0
      jitter_factor: 0.1
      retryable_errors:
        - "network"
        - "timeout"
        - "api"
        - "temporary"
    # Operation-specific retry policies
    policies:
      github_api:
        max_attempts: 5
        base_delay: "2s"
        max_delay: "60s"
        backoff_factor: 2.0
        jitter_factor: 0.2
        retryable_errors:
          - "network"
          - "timeout"
          - "api"
          - "temporary"
      claude_api:
        max_attempts: 3
        base_delay: "1s"
        max_delay: "30s"
        backoff_factor: 2.0
        jitter_factor: 0.1
        retryable_errors:
          - "network"
          - "timeout"
          - "api"
          - "temporary"
      rate_limited:
        max_attempts: 3
        base_delay: "60s"
        max_delay: "300s"
        backoff_factor: 1.5
        jitter_factor: 0.1
        retryable_errors:
          - "rate_limit"
          - "api"
          - "temporary"

  circuit_breaker:
    # Enable circuit breakers for external dependencies
    enabled: true
    # Default circuit breaker configuration
    default:
      max_failures: 5
      timeout: "60s"
      max_requests: 3
      failure_ratio: 0.6
      min_requests: 10
    # Service-specific circuit breaker configurations
    breakers:
      github_api:
        max_failures: 10
        timeout: "120s"
        max_requests: 5
        failure_ratio: 0.7
        min_requests: 20
      claude_api:
        max_failures: 5
        timeout: "60s"
        max_requests: 3
        failure_ratio: 0.5
        min_requests: 10
