# DeveloperAndQAAgent Configuration
#
# Environment variables can be used with ${VAR_NAME} syntax.
# All ${VAR_NAME} references are expanded from environment variables at runtime.
# See docs/environment-variables.md for complete reference.

github:
  # Personal access token (repo scope required)
  # Generate at: https://github.com/settings/tokens
  # Required scopes: repo, read:user
  # Format: ghp_xxxxxxxxxxxxxxxxxxxx or github_pat_xxxxxxxxxxxxxxxxxxxx
  token: "${GITHUB_TOKEN}"
  
  # Repository owner (organization or username)
  # Example: "myorg" or "myusername"
  owner: "gaskaj"
  
  # Repository name
  # Example: "my-project"
  repo: "DeveloperAndQAAgent"
  
  # Polling interval for checking new GitHub events
  # Supported formats: "30s", "1m", "5m"
  # Minimum recommended: "10s", Maximum recommended: "5m"
  poll_interval: "30s"
  
  # Labels to watch for claimable issues
  # Agent will only process issues with these labels
  # Labels are automatically managed: agent:ready -> agent:claimed -> agent:working
  watch_labels:
    - "agent:ready"

claude:
  # Anthropic API key
  # Get from: https://console.anthropic.com/
  # Format: sk-ant-api03-xxxxxxxxxxxx
  # Keep this secret and never commit to version control
  api_key: "${ANTHROPIC_API_KEY}"
  
  # Claude model to use for code generation
  # Available models: claude-sonnet-4-20250514, claude-sonnet-4-20241022
  # Recommended: claude-sonnet-4-20250514 (latest)
  model: "claude-sonnet-4-20250514"
  
  # Maximum tokens per response (limits response length)
  # Range: 1-8192, Recommended: 8192 for code generation
  # Lower values = faster responses, higher values = more complete code
  max_tokens: 8192

agents:
  developer:
    # Enable/disable the developer agent
    enabled: true
    
    # Maximum concurrent issues to work on simultaneously  
    # Recommended: 1-3 (higher values increase resource usage)
    # Must be > 0 when agent is enabled
    max_concurrent: 1
    
    # Directory for cloned repository workspaces
    # Must be writable by the agent process
    # Each issue gets its own workspace subdirectory
    # Example: "./workspaces/issue-123/"
    workspace_dir: "./workspaces"

state:
  # State storage backend
  # Currently only "file" is supported
  backend: "file"
  
  # Directory for persistent agent state files
  # Must be writable and persistent across restarts
  # Contains JSON files tracking agent workflow state
  dir: ".agentctl/state"

logging:
  # Log level: debug, info, warn, error
  # debug: Verbose logging for development
  # info: Normal operational logging
  # warn: Important warnings only
  # error: Error conditions only
  level: "info"

creativity:
  # Enable autonomous creativity mode when idle
  # When enabled, agent generates improvement suggestions during idle periods
  # SECURITY NOTE: Creates GitHub issues autonomously - review before enabling
  enabled: true
  
  # Seconds idle before entering creativity mode
  # Higher values = less frequent suggestions
  # Recommended: 120-600 seconds
  idle_threshold_seconds: 120
  
  # Cooldown between suggestion attempts (seconds)
  # Prevents spam suggestions
  # Recommended: 300-1800 seconds
  suggestion_cooldown_seconds: 300
  
  # Maximum open suggestion issues before pausing creativity
  # Prevents overwhelming the issue tracker
  # Must be > 0 when creativity is enabled
  # Recommended: 1-5
  max_pending_suggestions: 20
  
  # Maximum rejected suggestion titles to remember (avoids duplicates)
  # Higher values = better duplicate detection, more memory usage
  # Recommended: 50-200
  max_rejection_history: 50

decomposition:
  # Enable automatic issue decomposition for complex issues
  # When enabled, the agent estimates complexity during analysis and breaks
  # large issues into smaller subtasks that are processed independently.
  enabled: true
  # Iteration budget for complexity estimation (hard limit is 20).
  # Issues estimated to need more iterations than this are decomposed proactively.
  max_iteration_budget: 250
  # Maximum number of subtasks when decomposing an issue.
  max_subtasks: 5

shutdown:
  # Maximum time to wait for graceful shutdown before force kill
  timeout: "30s"
  # Whether to clean up workspace directories on shutdown
  cleanup_workspaces: true
  # Whether to reset agent:claimed labels to agent:ready on startup recovery
  reset_claims: true

error_handling:
  retry:
    # Enable retry mechanisms across agent communications
    enabled: true
    # Default retry policy applied when no specific policy is defined
    default:
      max_attempts: 3
      base_delay: "1s"
      max_delay: "30s"
      backoff_factor: 2.0
      jitter_factor: 0.1
      retryable_errors:
        - "network"
        - "timeout"
        - "api"
        - "temporary"
    # Operation-specific retry policies
    policies:
      github_api:
        max_attempts: 5
        base_delay: "2s"
        max_delay: "60s"
        backoff_factor: 2.0
        jitter_factor: 0.2
        retryable_errors:
          - "network"
          - "timeout"
          - "api"
          - "temporary"
      claude_api:
        max_attempts: 3
        base_delay: "1s"
        max_delay: "30s"
        backoff_factor: 2.0
        jitter_factor: 0.1
        retryable_errors:
          - "network"
          - "timeout"
          - "api"
          - "temporary"
      rate_limited:
        max_attempts: 3
        base_delay: "60s"
        max_delay: "300s"
        backoff_factor: 1.5
        jitter_factor: 0.1
        retryable_errors:
          - "rate_limit"
          - "api"
          - "temporary"

  circuit_breaker:
    # Enable circuit breakers for external dependencies
    enabled: true
    # Default circuit breaker configuration
    default:
      max_failures: 5
      timeout: "60s"
      max_requests: 3
      failure_ratio: 0.6
      min_requests: 10
    # Service-specific circuit breaker configurations
    breakers:
      github_api:
        max_failures: 10
        timeout: "120s"
        max_requests: 5
        failure_ratio: 0.7
        min_requests: 20
      claude_api:
        max_failures: 5
        timeout: "60s"
        max_requests: 3
        failure_ratio: 0.5
        min_requests: 10
