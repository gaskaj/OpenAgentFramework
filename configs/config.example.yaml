# DeveloperAndQAAgent Configuration
#
# Environment variables can be used with ${VAR_NAME} syntax.

github:
  # Personal access token (repo scope required)
  token: "${GITHUB_TOKEN}"
  # Repository owner
  owner: "gaskaj"
  # Repository name
  repo: "DeveloperAndQAAgent"
  # Polling interval for new events
  poll_interval: "30s"
  # Labels to watch for claimable issues
  watch_labels:
    - "agent:ready"

claude:
  # Anthropic API key
  api_key: "${ANTHROPIC_API_KEY}"
  # Model to use
  model: "claude-sonnet-4-20250514"
  # Maximum tokens per response
  max_tokens: 8192

agents:
  developer:
    enabled: true
    # Maximum concurrent issues to work on
    max_concurrent: 1
    # Directory for cloned workspaces
    workspace_dir: "./workspaces"

state:
  # State storage backend: "file"
  backend: "file"
  # Directory for state files
  dir: ".agentctl/state"

logging:
  # Log level: debug, info, warn, error
  level: "info"

creativity:
  # Enable autonomous creativity mode when idle
  enabled: true
  # Seconds idle before entering creativity mode
  idle_threshold_seconds: 120
  # Cooldown between suggestions (seconds)
  suggestion_cooldown_seconds: 300
  # Maximum open suggestion issues before pausing
  max_pending_suggestions: 20
  # Maximum rejected titles to remember
  max_rejection_history: 50

decomposition:
  # Enable automatic issue decomposition for complex issues
  # When enabled, the agent estimates complexity during analysis and breaks
  # large issues into smaller subtasks that are processed independently.
  enabled: true
  # Iteration budget for complexity estimation (hard limit is 20).
  # Issues estimated to need more iterations than this are decomposed proactively.
  max_iteration_budget: 250
  # Maximum number of subtasks when decomposing an issue.
  max_subtasks: 5

shutdown:
  # Maximum time to wait for graceful shutdown before force kill
  timeout: "30s"
  # Whether to clean up workspace directories on shutdown
  cleanup_workspaces: true
  # Whether to reset agent:claimed labels to agent:ready on startup recovery
  reset_claims: true

error_handling:
  retry:
    # Enable retry mechanisms across agent communications
    enabled: true
    # Default retry policy applied when no specific policy is defined
    default:
      max_attempts: 3
      base_delay: "1s"
      max_delay: "30s"
      backoff_factor: 2.0
      jitter_factor: 0.1
      retryable_errors:
        - "network"
        - "timeout"
        - "api"
        - "temporary"
    # Operation-specific retry policies
    policies:
      github_api:
        max_attempts: 5
        base_delay: "2s"
        max_delay: "60s"
        backoff_factor: 2.0
        jitter_factor: 0.2
        retryable_errors:
          - "network"
          - "timeout"
          - "api"
          - "temporary"
      claude_api:
        max_attempts: 3
        base_delay: "1s"
        max_delay: "30s"
        backoff_factor: 2.0
        jitter_factor: 0.1
        retryable_errors:
          - "network"
          - "timeout"
          - "api"
          - "temporary"
      rate_limited:
        max_attempts: 3
        base_delay: "60s"
        max_delay: "300s"
        backoff_factor: 1.5
        jitter_factor: 0.1
        retryable_errors:
          - "rate_limit"
          - "api"
          - "temporary"

  circuit_breaker:
    # Enable circuit breakers for external dependencies
    enabled: true
    # Default circuit breaker configuration
    default:
      max_failures: 5
      timeout: "60s"
      max_requests: 3
      failure_ratio: 0.6
      min_requests: 10
    # Service-specific circuit breaker configurations
    breakers:
      github_api:
        max_failures: 10
        timeout: "120s"
        max_requests: 5
        failure_ratio: 0.7
        min_requests: 20
      claude_api:
        max_failures: 5
        timeout: "60s"
        max_requests: 3
        failure_ratio: 0.5
        min_requests: 10
