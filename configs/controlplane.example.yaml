server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: "30s"
  write_timeout: "30s"
  shutdown_timeout: "15s"

database:
  host: "${DB_HOST}"
  port: 5432
  name: "oaf_controlplane"
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"

auth:
  jwt_secret: "${JWT_SECRET}"
  jwt_expiry: "15m"
  refresh_expiry: "168h"
  bcrypt_cost: 12

  google:
    enabled: false
    client_id: "${GOOGLE_CLIENT_ID}"
    client_secret: "${GOOGLE_CLIENT_SECRET}"
    redirect_url: "http://localhost:8080/api/v1/auth/oauth/google/callback"

  azure:
    enabled: false
    tenant_id: "${AZURE_TENANT_ID}"
    client_id: "${AZURE_CLIENT_ID}"
    client_secret: "${AZURE_CLIENT_SECRET}"
    redirect_url: "http://localhost:8080/api/v1/auth/oauth/azure/callback"

cors:
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:8080"

logging:
  level: "info"
  format: "json"

versioning:
  default_version: "v1"
  deprecation_warning: true
  supported_versions:
    - version: "v1"
      is_default: true
      is_deprecated: false
