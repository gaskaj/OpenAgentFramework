# OpenAgentFramework Configuration
#
# Environment variables can be used with ${VAR_NAME} syntax.

github:
  # Personal access token (repo scope required)
  token: "${GITHUB_TOKEN}"
  # Repository owner
  owner: "gaskaj"
  # Repository name
  repo: "OpenAgentFramework"
  # Polling interval for new events
  poll_interval: "30s"
  # Labels to watch for claimable issues
  watch_labels:
    - "agent:ready"

claude:
  # Anthropic API key
  api_key: "${ANTHROPIC_API_KEY}"
  # Model to use
  model: "claude-sonnet-4-20250514"
  # Maximum tokens per response
  max_tokens: 8192

agents:
  developer:
    enabled: true
    # Maximum concurrent issues to work on
    max_concurrent: 1
    # Directory for cloned workspaces
    workspace_dir: "./workspaces"
    # Recovery and state consistency configuration
    recovery:
      enabled: true
      startup_validation: true
      auto_cleanup_orphaned: true
      max_resume_age: "24h"
      validation_interval: "1h"
      consistency:
        validate_on_startup: true
        validate_periodically: true
        reconcile_drift: true

state:
  # State storage backend: "file"
  backend: "file"
  # Directory for state files
  dir: ".agentctl/state"

logging:
  # Log level: debug, info, warn, error
  level: "info"

creativity:
  # Enable autonomous creativity mode when idle (disabled by default for safety)
  enabled: true
  # Seconds idle before entering creativity mode
  idle_threshold_seconds: 120
  # Cooldown between suggestions (seconds)
  suggestion_cooldown_seconds: 300
  # Maximum open suggestion issues before pausing
  max_pending_suggestions: 20
  # Maximum rejected titles to remember
  max_rejection_history: 50

decomposition:
  # Enable automatic issue decomposition for complex issues
  enabled: true
  # Iteration budget — each API round-trip counts as 1 iteration
  max_iteration_budget: 100
  # Maximum number of subtasks when decomposing
  max_subtasks: 5

error_handling:
  retry:
    # Enable retry mechanisms (disabled by default for safety)
    enabled: true
    # Default retry policy
    default:
      max_attempts: 3
      base_delay: "1s"
      max_delay: "30s"
      backoff_factor: 2.0
      jitter_factor: 0.1
      retryable_errors:
        - "network"
        - "timeout"
        - "api"
        - "temporary"
    # Operation-specific policies
    policies:
      github_api:
        max_attempts: 5
        base_delay: "2s"
        max_delay: "60s"
        backoff_factor: 2.0
        jitter_factor: 0.2
        retryable_errors:
          - "network"
          - "timeout"
          - "api"
          - "temporary"
      claude_api:
        max_attempts: 3
        base_delay: "1s"
        max_delay: "30s"
        backoff_factor: 2.0
        jitter_factor: 0.1
        retryable_errors:
          - "network"
          - "timeout"
          - "api"
          - "temporary"

  circuit_breaker:
    # Enable circuit breakers (disabled by default for safety)
    enabled: true
    # Default configuration
    default:
      max_failures: 5
      timeout: "60s"
      max_requests: 3
      failure_ratio: 0.6
      min_requests: 10
    # Service-specific configurations
    breakers:
      github_api:
        max_failures: 10
        timeout: "120s"
        max_requests: 5
        failure_ratio: 0.7
        min_requests: 20
      claude_api:
        max_failures: 5
        timeout: "60s"
        max_requests: 3
        failure_ratio: 0.5
        min_requests: 10
